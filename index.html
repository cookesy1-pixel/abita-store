<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <title>Abita Store</title>
  <script src="https://cdn.tailwindcss.com"></script>
</head>

<body class="bg-gray-100">

<!-- Navbar -->
<nav class="bg-white p-4 flex justify-between shadow">
  <h1 class="text-xl font-bold">Abita Store</h1>
  <div>
    <a href="#" class="mx-2">Home</a>
    <a href="#" class="mx-2">Shop</a>
    <a href="#" class="mx-2">Contact</a>
  </div>
</nav>

<!-- Hero -->
<section class="text-center p-10 bg-gray-200">
  <h2 class="text-3xl font-bold">Modern Home Collection</h2>
  <p class="mt-2">Upgrade your living space</p>
  <button class="mt-4 bg-black text-white px-6 py-2">Shop Now</button>
</section>

<!-- Products -->
<section class="p-6 grid grid-cols-1 md:grid-cols-3 gap-6">

  <div class="bg-white p-4 shadow">
    <img src="https://via.placeholder.com/200">
    <h3 class="mt-2 font-bold">Chair</h3>
    <p>$120</p>
    <button class="bg-black text-white px-4 py-1 mt-2">Buy</button>
  </div>

  <div class="bg-white p-4 shadow">
    <img src="https://via.placeholder.com/200">
    <h3 class="mt-2 font-bold">Table</h3>
    <p>$250</p>
    <button class="bg-black text-white px-4 py-1 mt-2">Buy</button>
  </div>

  <div class="bg-white p-4 shadow">
    <img src="https://via.placeholder.com/200">
    <h3 class="mt-2 font-bold">Lamp</h3>
    <p>$80</p>
    <button class="bg-black text-white px-4 py-1 mt-2">Buy</button>
  </div>

</section>

<!-- Footer -->
<footer class="bg-black text-white text-center p-4">
  © 2026 Abita Store
</footer>

</body>
</html>
